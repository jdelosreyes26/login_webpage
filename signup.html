<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Phone & Google</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Create Account</h1>
            <p class="subtitle">Sign up to get started</p>
            
            <!-- Phone Sign Up -->
            <div class="login-section">
                <div id="phone-signup-section">
                    <h2>Phone Number Sign Up</h2>
                    <form id="signup-form">
                        <input type="text" id="fullname" placeholder="Full Name" required>
                        <input type="email" id="email" placeholder="Email Address" required>
                        <input type="tel" id="phone" placeholder="+1 (555) 123-4567" required>
                        <input type="password" id="password" placeholder="Password (min 6 characters)" minlength="6" required>
                        <input type="password" id="confirm-password" placeholder="Confirm Password" minlength="6" required>
                        <button type="button" id="send-otp-btn" class="btn btn-primary">Send OTP</button>
                    </form>
                    
                    <div id="otp-section" style="display: none;">
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
                        <button type="button" id="verify-otp-btn" class="btn btn-primary">Verify & Create Account</button>
                        <p id="otp-timer" class="timer"></p>
                    </div>
                </div>
            </div>
            
            <div class="divider">OR</div>
            
            <!-- Google Sign Up -->
            <div class="login-section">
                <button type="button" id="google-signup-btn" class="btn btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="1"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24"></path>
                        <path d="M1 12h6m6 0h6"></path>
                        <path d="M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"></path>
                    </svg>
                    Sign up with Google
                </button>
            </div>

            <!-- Account Created Success -->
            <div id="account-success" style="display: none;" class="user-info">
                <h2>Account Created!</h2>
                <p id="success-name"></p>
                <p id="success-email"></p>
                <a href="index.html" class="btn btn-primary" style="text-decoration: none;">Go to Login</a>
            </div>
            
            <!-- Already have account -->
            <div class="login-footer">
                <p>Already have an account? <a href="index.html">Login here</a></p>
            </div>
            
            <!-- Messages -->
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="firebase-config.js"></script>
    <script src="signup.js"></script>
</body>
</html>
